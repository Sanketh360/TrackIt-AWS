name: Docker build -> push -> deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
  
    - name: Checkout code
      uses: actions/checkout@v4

  
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

  
    - name: Build jar
      run: ./mvnw clean package -DskipTests

  
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
   
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-trackit:latest .

  
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-trackit:latest

   
    - name: SSH and Deploy in EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-trackit || true
          docker rm spring-trackit || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-trackit:latest
          docker run -d \
            --name spring-trackit \
            -p 9090:9090 \
            -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
            -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-trackit:latest
